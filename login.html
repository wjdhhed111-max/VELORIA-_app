<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELORIA - Official Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script type="module">
        // Firebase SDKs များကို Online မှ တိုက်ရိုက်ချိတ်ဆက်ခြင်း
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ဘရိုပေးထားတဲ့ Config အသစ်
        const firebaseConfig = {
          apiKey: "AIzaSyBIt4p-XylMx6rvzOfamM7VNv2SeuixDFw",
          authDomain: "veloria-web.firebaseapp.com",
          projectId: "veloria-web",
          storageBucket: "veloria-web.firebasestorage.app",
          messagingSenderId: "497110166194",
          appId: "1:497110166194:web:19845f8890a91a2b7af7ab"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const provider = new GoogleAuthProvider();

        // Google Login စတင်ရန် Function
        window.loginWithGoogle = function() {
            signInWithRedirect(auth, provider);
        }

        // Redirect ပြန်လာတဲ့အခါ အောင်မြင်မှုရှိမရှိ စစ်ဆေးခြင်း
        getRedirectResult(auth).then((result) => {
            if (result && result.user) {
                window.location.href = "home.html"; // အောင်မြင်ရင် home.html ကို သွားမယ်
            }
        }).catch((error) => {
            console.error("Auth Error:", error.message);
        });

        // Login ဝင်ထားပြီးသားဆိုရင် တန်းပို့ရန်
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "home.html";
            }
        });
    </script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d1b2a; /* 3691.png အရောင် */
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 40px 20px; color: white;
        }

        .main-logo { width: 140px; margin-bottom: 30px; }

        .card-container { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 20px; }
        
        .auth-card {
            border-radius: 25px; padding: 22px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Seller Card */
        .seller-card { background: #cbdfe6; color: #1e293b; }
        .seller-card::before {
            content: ""; position: absolute; inset: 0; opacity: 0.15;
            background: url('https://www.transparenttextures.com/patterns/circuit-board.png');
        }

        /* Customer Card */
        .customer-card { background: #dcd0ef; color: #1e293b; }
        .customer-card::before {
            content: ""; position: absolute; inset: 0; opacity: 0.1;
            background: url('https://www.transparenttextures.com/patterns/leaves.png');
        }

        .card-header { align-self: flex-start; z-index: 1; font-weight: 700; font-size: 15px; margin-bottom: 12px; }
        .inner-logo { width: 85px; margin-bottom: 20px; z-index: 1; }

        .google-btn {
            width: 100%; padding: 14px; border-radius: 35px; border: none;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-weight: 700; cursor: pointer; z-index: 1; transition: 0.2s;
        }

        .btn-gold { background: linear-gradient(135deg, #c5a358, #f0d78c, #c5a358); color: #1a202c; }
        .btn-silver { background: linear-gradient(135deg, #a0aec0, #edf2f7, #a0aec0); color: #1a202c; }
        .google-btn:active { transform: scale(0.96); }

        footer { margin-top: auto; padding: 20px; font-size: 11px; color: #64748b; }
    </style>
</head>
<body>

    <img src="logo.png" class="main-logo" onerror="this.src='https://i.ibb.co/Xz9yvjX/veloria-logo.png'">

    <div class="card-container">
        <div class="auth-card seller-card">
            <div class="card-header"><i class="fa-solid fa-circle-user"></i> Seller Account</div>
            <img src="logo.png" class="inner-logo" onerror="this.src='https://i.ibb.co/Xz9yvjX/veloria-logo.png'">
            <button class="google-btn btn-gold" onclick="loginWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18">
                Sign in with Google
            </button>
        </div>

        <div class="auth-card customer-card">
            <div class="card-header"><i class="fa-solid fa-circle-user"></i> Customer Account</div>
            <img src="logo.png" class="inner-logo" onerror="this.src='https://i.ibb.co/Xz9yvjX/veloria-logo.png'">
            <button class="google-btn btn-silver" onclick="loginWithGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="18">
                Sign in with Google
            </button>
        </div>
    </div>

    <footer>© 2025 Veloria. All rights reserved.</footer>

</body>
</html>
